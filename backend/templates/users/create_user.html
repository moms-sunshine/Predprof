{% extends 'base.html' %}
{% block title %}Создать пользователя{% endblock %}
{% block content %}
<h1>Создание нового пользователя</h1>
<p>Заполните имя, фамилию, логин и пароль. Новый пользователь сможет загружать тестовые данные и смотреть аналитику.</p>
<form method="post" action="{% url 'users:create_user' %}">
    {% csrf_token %}
    <div class="form-group">
        <label for="first_name">Имя</label>
        <input type="text" name="first_name" id="first_name" required>
    </div>
    <div class="form-group">
        <label for="last_name">Фамилия</label>
        <input type="text" name="last_name" id="last_name" required>
    </div>
    <div class="form-group">
        <label for="username">Логин</label>
        <input type="text" name="username" id="username" required>
    </div>
    <div class="form-group">
        <label for="password">Пароль</label>
        <input type="password" name="password" id="password" required minlength="6">
    </div>
    <button type="submit" class="btn">Создать пользователя</button>
</form>
{% endblock %}
